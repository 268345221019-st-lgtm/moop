
<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="gradient-bg min-h-screen flex items-center justify-center p-6">

<div class="glass rounded-[40px] p-12 shadow-2xl w-full max-w-md">

<h1 class="text-5xl font-bold text-pink-700 text-center mb-10">
Login
</h1>

<form class="space-y-6">

<input 
type="email" 
placeholder="Email" 
class="w-full p-5 rounded-2xl border-0 shadow-lg"
>

<input 
type="password" 
placeholder="Password" 
class="w-full p-5 rounded-2xl border-0 shadow-lg"
>

<button 
type="button"
onclick="goHome()"
class="w-full bg-pink-500 hover:bg-pink-600 text-white py-4 rounded-full shadow-xl duration-300"
>
Sign In
</button>

</form>

</div>

<script>
function goHome() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
